server {
    listen 80;
    server_name gabriel.hirableaiagents.com;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name gabriel.hirableaiagents.com;

    ssl_certificate     /etc/letsencrypt/live/gabriel.hirableaiagents.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gabriel.hirableaiagents.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 256;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # Next.js app
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # SSE support — disable buffering for streaming responses
        proxy_buffering    off;
        proxy_read_timeout 120s;
    }

    # Static assets from Next.js — aggressive caching
    location /_next/static/ {
        proxy_pass       http://127.0.0.1:3000;
        proxy_set_header Host $host;
        add_header       Cache-Control "public, max-age=31536000, immutable";
        access_log       off;
    }

    # Next.js image optimization
    location /_next/image {
        proxy_pass       http://127.0.0.1:3000;
        proxy_set_header Host $host;
    }
}
